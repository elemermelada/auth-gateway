apiVersion: v2
# The chart's name doubles as the OCI package name on push
# (ghcr.io/<repo>/auth-gateway-chart). It's suffixed with `-chart` to avoid
# colliding with the container image package (ghcr.io/<repo>/auth-gateway).
# Rendered resource names stay `auth-gateway` via nameOverride in values.yaml.
name: auth-gateway-chart
description: |
  Oauth2-Proxy instance selector frontdoor — a tiny, stateless Go reverse proxy
  that routes by its own cookie between two oauth2-proxy instances behind a
  single hostname/ingress.
type: application
# version   → the chart version, bump on any chart change
# appVersion→ the app version, tracks the auth-gateway image
version: 0.1.1
appVersion: "latest"
keywords:
  - oauth2-proxy
  - auth
  - reverse-proxy
sources:
  - https://github.com/zenztech/auth-gateway
