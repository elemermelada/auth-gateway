<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <title>Choose sign-in</title>
  <style>
    :root { color-scheme: light dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: #f5f6f8; color: #1a1a1a;
    }
    .card {
      background: #fff; padding: 2.5rem 2rem; border-radius: 12px;
      box-shadow: 0 6px 24px rgba(0,0,0,.08); text-align: center;
      width: 100%; max-width: 360px;
    }
    h1 { font-size: 1.25rem; margin: 0 0 .25rem; }
    p { margin: 0 0 1.5rem; color: #666; font-size: .9rem; }
    .btns { display: grid; gap: .75rem; }
    a.btn {
      display: block; padding: .85rem 1rem; border-radius: 8px;
      text-decoration: none; font-weight: 600; font-size: 1rem;
      border: 1px solid transparent; transition: filter .1s;
    }
    a.btn:hover { filter: brightness(.95); }
    .primary { background: #2b5cff; color: #fff; }
    .secondary { background: #eef1f6; color: #1a1a1a; border-color: #d6dae2; }
    @media (prefers-color-scheme: dark) {
      body { background: #12141a; color: #e9eaed; }
      .card { background: #1c1f27; box-shadow: 0 6px 24px rgba(0,0,0,.4); }
      p { color: #9aa0ac; }
      .secondary { background: #262a34; color: #e9eaed; border-color: #333947; }
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Choose sign-in</h1>
    <p>Select how you want to authenticate to continue.</p>
    <div class="btns">
      <a id="primary" class="btn primary" href="/.auth/select?mode=primary">Primary</a>
      <a id="secondary" class="btn secondary" href="/.auth/select?mode=secondary">Secondary</a>
    </div>
  </main>
  <script>
    // Preserve where the user was headed so /.auth/select can redirect back.
    var rd = encodeURIComponent(location.pathname + location.search);
    document.getElementById('primary').href = '/.auth/select?mode=primary&rd=' + rd;
    document.getElementById('secondary').href = '/.auth/select?mode=secondary&rd=' + rd;
  </script>
</body>
</html>
