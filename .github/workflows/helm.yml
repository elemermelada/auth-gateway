name: Helm

on:
  push:
    branches:
      - main
    paths:
      - 'charts/**'
      - '.github/workflows/helm.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'charts/**'
      - '.github/workflows/helm.yml'

env:
  CHART_DIR: charts/auth-gateway

jobs:
  lint_package_push:
    name: Lint, package & push chart
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Lint chart
        run: helm lint ${{ env.CHART_DIR }}

      # Renders the templates to catch errors `helm lint` misses. The required
      # backend values are supplied so the render doesn't fail on them.
      - name: Template chart (render check)
        run: |
          helm template auth-gateway ${{ env.CHART_DIR }} \
            --set config.backendPrimary=http://primary \
            --set config.backendSecondary=http://secondary \
            > /dev/null

      - name: Package chart
        run: helm package ${{ env.CHART_DIR }} --destination dist

      # Needed for the push (main) and for the version guard's registry read on
      # PRs. Harmless to run always.
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # GHCR tags are mutable, so `helm push` would silently overwrite an
      # already-published version. Fail instead, forcing a Chart.yaml version
      # bump on every chart change. `helm show chart` succeeds only if the
      # version already exists in the registry.
      - name: Fail if chart version already published
        run: |
          META=$(helm show chart dist/*.tgz)
          NAME=$(echo "$META" | yq '.name')
          VERSION=$(echo "$META" | yq '.version')
          REF="oci://ghcr.io/${{ github.repository }}/${NAME}"
          echo "Checking whether ${REF}:${VERSION} already exists..."
          if helm show chart "${REF}" --version "${VERSION}" > /dev/null 2>&1; then
            echo "::error::Chart ${NAME} version ${VERSION} is already published. Bump 'version:' in ${{ env.CHART_DIR }}/Chart.yaml."
            exit 1
          fi
          echo "Version ${VERSION} not yet published — OK to push."

      # helm push derives the OCI package name from the chart's `name:` field,
      # so this publishes to ghcr.io/<repo>/auth-gateway-chart:<version>.
      - name: Push chart
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          helm push dist/*.tgz oci://ghcr.io/${{ github.repository }}
